<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>診所廚房</title>
  <style>
    :root {
      --blue:   #007AFF; --green:  #34C759; --red:    #FF3B30;
      --orange: #FF9500; --purple: #AF52DE; --gray:   #8E8E93;
      --bg:     #F2F2F7; --card:   #FFFFFF; --border: #E5E5EA;
      --text:   #1C1C1E; --text2:  #6C6C70; --text3:  #AEAEB2;
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 選人畫面 ── */
    #screen-user {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 32px 20px;
    }
    #screen-user h1 { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    #screen-user p  { color: var(--text2); margin-bottom: 32px; font-size: 15px; }
    .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 12px; width: 100%; max-width: 520px; }
    .user-card {
      background: var(--card); border-radius: 16px; padding: 20px 10px 14px;
      text-align: center; cursor: pointer; border: 2px solid transparent;
      transition: all .15s; box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .user-card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .user-card .avatar {
      width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,#007AFF,#5AC8FA);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;
      font-size: 20px; font-weight: 700; color: #fff;
    }
    .user-card .uname { font-size: 13px; font-weight: 600; }
    .btn-add-user {
      background: var(--card); border-radius: 16px; padding: 20px 10px 14px;
      text-align: center; cursor: pointer; border: 2px dashed var(--border);
      color: var(--blue); font-size: 13px; font-weight: 600;
    }
    .btn-add-user .avatar { background: var(--bg); color: var(--blue); font-size: 24px; }

    /* ── 主畫面 ── */
    #screen-main { display: none; }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(242,242,247,.9); backdrop-filter: blur(20px);
      padding: 12px 20px 0; border-bottom: 1px solid var(--border);
    }
    .topbar-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .topbar-head h1 { font-size: 20px; font-weight: 700; }
    .curr-user { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .curr-user .mini-av {
      width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#007AFF,#5AC8FA);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #fff;
    }
    .curr-user span { font-size: 14px; font-weight: 600; color: var(--blue); }
    .tabs { display: flex; gap: 0; overflow-x: auto; }
    .tab {
      padding: 8px 16px; font-size: 14px; font-weight: 600; color: var(--text2);
      border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap;
      transition: all .15s;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    .page { display: none; padding: 16px 16px 80px; }
    .page.active { display: block; }

    /* ── 通用卡片 ── */
    .card {
      background: var(--card); border-radius: 16px; padding: 16px;
      margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .card-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0;
      border-bottom: 1px solid var(--border); }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 15px; }
    .row-value { font-size: 15px; color: var(--text2); }

    /* ── 按鈕 ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 12px; border: none; cursor: pointer;
      font-size: 15px; font-weight: 600; font-family: var(--font); transition: all .15s;
    }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: #0066d6; }
    .btn-danger  { background: var(--red); color: #fff; }
    .btn-ghost   { background: rgba(0,122,255,.1); color: var(--blue); }
    .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; }

    /* ── 狀態標籤 ── */
    .badge {
      display: inline-block; padding: 3px 8px; border-radius: 20px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .badge-green  { background: rgba(52,199,89,.15);  color: var(--green); }
    .badge-orange { background: rgba(255,149,0,.15);  color: var(--orange); }
    .badge-red    { background: rgba(255,59,48,.15);  color: var(--red); }
    .badge-blue   { background: rgba(0,122,255,.12);  color: var(--blue); }
    .badge-purple { background: rgba(175,82,222,.15); color: var(--purple); }

    /* ── 今日工作單 ── */
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin: 20px 0 10px;
    }
    .section-head h2 { font-size: 17px; font-weight: 700; }
    .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px,1fr)); gap: 8px; }
    .staff-chip {
      background: var(--card); border-radius: 12px; padding: 12px 8px; text-align: center;
      cursor: pointer; border: 2px solid var(--border); transition: all .15s;
    }
    .staff-chip.on     { border-color: var(--green);  background: rgba(52,199,89,.08); }
    .staff-chip.off    { border-color: var(--border); opacity: .5; }
    .staff-chip.picked { border-color: var(--gray);   background: rgba(142,142,147,.08); opacity: .75; }
    .staff-chip .dot { width: 8px; height: 8px; border-radius: 50%; margin: 0 auto 6px; background: var(--border); }
    .staff-chip.on .dot     { background: var(--green); }
    .staff-chip.picked .dot { background: var(--gray); }
    .staff-chip .sname { font-size: 12px; font-weight: 600; }
    .chip-sub { font-size: 10px; color: var(--text3); margin-top: 3px; }

    .today-group-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .today-group { margin-top: 14px; }
    .chips-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .case-chip {
      display: flex; flex-direction: column; align-items: center; text-align: center;
      min-width: 76px; padding: 10px 10px 8px; border-radius: 12px; cursor: pointer;
      border: 2px solid var(--blue); background: rgba(0,122,255,.07); transition: all .15s;
    }
    .case-chip[data-type="powder"] { border-color: var(--purple); background: rgba(175,82,222,.07); }
    .case-chip.picked { border-color: var(--gray); background: rgba(142,142,147,.08); opacity: .65; }
    .case-chip .sname { font-size: 12px; font-weight: 700; color: var(--text); }
    .case-chip .chip-sub { font-size: 10px; color: var(--text2); margin-top: 3px; }

    .supp-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .supp-item { display: flex; flex-direction: column; align-items: center;
      background: rgba(175,82,222,.07); border: 1px solid rgba(175,82,222,.2);
      border-radius: 8px; padding: 4px 10px; }
    .supp-item .si-name { font-size: 11px; color: var(--text2); }
    .supp-item .si-val  { font-size: 13px; font-weight: 700; }

    /* B 員工批次左右分欄 */
    .batch-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    @media (max-width: 700px) { .batch-split { grid-template-columns: 1fr; } }
    .batch-col { min-width: 0; }
    .batch-col-head { font-size: 13px; font-weight: 700; color: var(--text2);
      text-transform: uppercase; letter-spacing: .4px; margin-bottom: 6px; }
    .aw-empty { color: var(--text3); font-size: 13px; padding: 16px 0; }
    .aw-cups-badge { font-size: 14px; color: var(--text2);
      background: rgba(175,82,222,.08); border: 1px solid rgba(175,82,222,.2);
      border-radius: 8px; padding: 4px 12px; display: inline-block; margin-bottom: 4px; }
    .aw-cups-badge strong { color: var(--purple); font-size: 18px; margin: 0 2px; }
    .aw-cat { font-size: 11px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .4px; padding: 8px 0 2px; }
    /* 備註欄 */
    .batch-notes-wrap { margin-top: 8px; margin-bottom: 4px; }
    .batch-notes-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
    .batch-notes-area { width: 100%; box-sizing: border-box; resize: vertical;
      font-size: 13px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text); font-family: inherit; }

    .batch-box {
      background: linear-gradient(135deg, #007AFF 0%, #5856D6 100%);
      border-radius: 16px; padding: 18px; color: #fff; margin-bottom: 12px;
    }
    .batch-box .num { font-size: 36px; font-weight: 800; line-height: 1; }
    .batch-box .label { font-size: 13px; opacity: .8; margin-top: 4px; }

    /* 粉包計算 */
    .powder-box {
      background: linear-gradient(135deg, #FF9500 0%, #FF6B00 100%);
      border-radius: 16px; padding: 16px; color: #fff; margin-bottom: 12px;
    }
    .powder-title { font-size: 13px; font-weight: 700; opacity: .85; margin-bottom: 4px; letter-spacing: .5px; }
    .powder-ratio { font-size: 12px; opacity: .75; margin-bottom: 8px; }
    .powder-per-cup { font-size: 15px; margin-bottom: 12px; }
    .powder-per-cup strong { font-size: 28px; font-weight: 800; }
    .powder-batch-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .powder-batch-item {
      background: rgba(255,255,255,.2); border-radius: 12px; padding: 10px 16px;
      min-width: 100px; text-align: center;
    }
    .pb-label { font-size: 12px; opacity: .85; margin-bottom: 4px; }
    .pb-val { font-size: 26px; font-weight: 800; line-height: 1; }
    .pb-unit { font-size: 14px; font-weight: 400; }

    /* 個案粉包行 */
    .case-powder {
      display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
      background: rgba(255,149,0,.1); border: 1px solid rgba(255,149,0,.3);
      border-radius: 10px; padding: 8px 12px; margin: 8px 0; font-size: 13px;
    }
    .cp-icon { font-size: 16px; }
    .cp-label { font-weight: 700; color: #CC6600; }
    .cp-val { color: var(--text1); }
    .cp-val strong { font-size: 15px; font-weight: 800; color: #CC4400; }
    .cp-ratio { color: var(--text3); font-size: 12px; }
    .cp-jar { color: #a05800; font-size: 11px; font-weight: 700;
      background: rgba(255,149,0,.12); border-radius: 6px; padding: 1px 6px; }

    /* 員工配方個案提醒 */
    .srx-alert {
      margin-top: 12px; padding: 10px 12px;
      background: rgba(255,204,0,.15); border: 1px solid rgba(255,149,0,.4);
      border-radius: 10px; font-size: 13px;
    }
    .srx-icon { font-size: 15px; margin-right: 4px; }
    .srx-label { font-weight: 700; color: #a05800; }
    .srx-list { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 6px; }
    .srx-item {
      background: white; border: 1px solid rgba(255,149,0,.4);
      border-radius: 8px; padding: 3px 10px; font-size: 13px; color: var(--text);
    }

    /* 個案姓名 + 備註 + 出單方式 */
    .case-patient {
      display: inline-block; font-size: 15px; font-weight: 800;
      color: var(--blue); margin-right: 6px;
    }
    .case-notes {
      font-size: 13px; color: var(--text1);
      background: #fffbe6; border-left: 3px solid var(--orange);
      border-radius: 0 8px 8px 0; padding: 6px 10px; margin: 6px 0;
    }
    .case-dtype {
      display: inline-block; font-size: 11px; font-weight: 700;
      background: var(--bg); border-radius: 6px; padding: 1px 6px;
      color: var(--text2);
    }

    /* 出單方式選擇器（三選項） */
    .pkg-selector { display: flex; gap: 8px; }
    .pkg-opt { flex: 1; cursor: pointer; }
    .pkg-opt input[type="radio"] { display: none; }
    .pkg-card {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 10px 8px; border-radius: 12px; border: 2px solid var(--separator);
      transition: border-color .15s, background .15s;
    }
    .pkg-opt input:checked + .pkg-card {
      border-color: var(--blue); background: rgba(0,122,255,.08);
    }
    .pkg-icon { font-size: 22px; }
    .pkg-name { font-size: 14px; font-weight: 700; }
    .pkg-note { font-size: 11px; color: var(--text3); }

    /* 產品區塊 */
    .product-section { margin-bottom: 28px; }
    .product-header {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0 12px; padding-bottom: 8px;
      border-bottom: 2px solid var(--blue);
    }
    .product-tag {
      background: var(--blue); color: #fff;
      font-size: 13px; font-weight: 700; letter-spacing: .5px;
      padding: 3px 12px; border-radius: 20px;
    }
    .product-hname {
      font-size: 20px; font-weight: 800; color: var(--text1);
    }
    .product-unit-note {
      font-size: 12px; color: var(--text3); margin-left: auto;
    }
    .product-no-staff {
      background: var(--card); border-radius: 12px; padding: 12px 16px;
      font-size: 13px; color: var(--text2); margin-bottom: 10px;
    }

    /* 處方頁產品分組 */
    .rx-product-group { margin-bottom: 24px; }
    .rx-product-label {
      font-size: 11px; font-weight: 800; letter-spacing: 1.5px;
      color: var(--blue); text-transform: uppercase;
      padding: 4px 0; border-bottom: 1px solid var(--separator);
      margin-bottom: 10px;
    }

    .case-card {
      background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px;
      border-left: 4px solid var(--blue);
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .case-card.powder { border-left-color: var(--purple); }
    .case-card .case-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .case-card .case-name { font-size: 17px; font-weight: 700; }
    .case-card .case-meta { font-size: 13px; color: var(--text2); margin-top: 2px; }
    .prep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 10px; }
    .prep-item { background: var(--bg); border-radius: 8px; padding: 8px 10px; }
    .prep-item .pi-name { font-size: 12px; color: var(--text2); }
    .prep-item .pi-val  { font-size: 14px; font-weight: 700; }
    .warn-box { background: rgba(255,149,0,.1); border-radius: 8px; padding: 8px 12px;
      color: var(--orange); font-size: 13px; font-weight: 600; margin-top: 8px; }

    /* ── 處方 ── */
    .rx-card {
      background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px;
      cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: transform .15s;
    }
    .rx-card:hover { transform: translateY(-1px); }
    .rx-code { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 1px; }
    .rx-name { font-size: 18px; font-weight: 700; margin: 2px 0; }
    .rx-meta { font-size: 13px; color: var(--text2); }
    .ingredient-editor { display: grid; gap: 4px; }
    .ie-row {
      display: grid; grid-template-columns: 1fr auto 80px; gap: 8px; align-items: center;
      padding: 6px 0; border-bottom: 1px solid var(--border);
    }
    .ie-row:last-child { border-bottom: none; }
    .ie-cat { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: .5px;
      padding: 12px 0 4px; grid-column: 1/-1; }
    .ie-row input[type=number] {
      width: 80px; padding: 6px 8px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 14px; text-align: right; font-family: var(--font);
    }
    .ie-row input:focus { outline: none; border-color: var(--blue); }

    /* ── 庫存 ── */
    .inv-row {
      display: flex; align-items: center; gap: 12px; padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .inv-row:last-child { border-bottom: none; }
    .inv-name { flex: 1; font-size: 15px; font-weight: 600; }
    .inv-unit { font-size: 12px; color: var(--text2); }
    .inv-qty  { font-size: 17px; font-weight: 700; min-width: 60px; text-align: right; }
    .inv-edit { cursor: pointer; color: var(--blue); font-size: 13px; }
    .cat-header { font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: .5px;
      padding: 14px 0 6px; text-transform: uppercase; }

    /* ── 成本 ── */
    .cost-subtabs {
      display: flex; align-items: center; gap: 4px;
      margin: 8px 0 16px; border-bottom: 1px solid var(--border); padding-bottom: 0;
    }
    .cost-tab {
      padding: 8px 14px; font-size: 13px; font-weight: 600; background: none; border: none;
      color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent;
      margin-bottom: -1px; transition: all .15s;
    }
    .cost-tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .cost-settings-btn { margin-left: auto; }
    .cost-section { display: none; }
    .cost-section.active { display: block; }

    .cost-grand-card {
      background: linear-gradient(135deg, #1C1C1E 0%, #3A3A3C 100%);
      border-radius: 16px; padding: 18px; color: #fff; margin-bottom: 14px;
    }
    .cost-grand-label { font-size: 12px; opacity: .7; margin-bottom: 4px; }
    .cost-grand-num { font-size: 36px; font-weight: 800; line-height: 1; }
    .cost-grand-sub { display: flex; gap: 16px; margin-top: 8px; font-size: 13px; opacity: .8; }

    .cost-card {
      background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }
    .cost-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .cost-card-name { font-size: 16px; font-weight: 700; }
    .cost-card-cups { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .cost-card-total { font-size: 24px; font-weight: 800; color: var(--blue); }
    .cost-card-per  { font-size: 12px; color: var(--text2); text-align: right; margin-top: 2px; }
    .cost-breakdown { margin-top: 2px; }
    .cb-row { display: flex; justify-content: space-between; padding: 5px 0;
      border-bottom: 1px solid var(--border); font-size: 14px; }
    .cb-row:last-child { border-bottom: none; }
    .cb-zero { color: var(--text3); }

    /* 月報 */
    .cost-month-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 14px;
    }
    .cost-month-nav button {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 16px; cursor: pointer; color: var(--blue);
    }
    .cost-month-nav span { font-size: 16px; font-weight: 700; min-width: 90px; text-align: center; }
    .cost-month-summary {
      display: flex; gap: 10px; margin-bottom: 14px; overflow-x: auto;
    }
    .cms-card {
      background: var(--card); border-radius: 12px; padding: 12px 16px;
      min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,.05); flex-shrink: 0;
    }
    .cms-name { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 4px; }
    .cms-total { font-size: 20px; font-weight: 800; color: var(--blue); }
    .cms-detail { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .cost-month-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .cost-month-table th {
      text-align: left; padding: 8px 6px; font-size: 11px; font-weight: 700;
      color: var(--text2); border-bottom: 2px solid var(--border);
    }
    .cost-month-table td {
      padding: 8px 6px; border-bottom: 1px solid var(--border); color: var(--text2);
    }
    .cost-month-table tr:last-child td { border-bottom: none; }
    .cost-month-table .col-date { color: var(--text); font-weight: 600; white-space: nowrap; }
    .cost-month-table .col-total { font-weight: 700; color: var(--text); }
    .cost-month-table .col-zero { color: var(--text3); }
    .cost-month-table .row-total { background: var(--bg); }
    .cost-month-table .row-total td { font-weight: 700; color: var(--text); border-top: 2px solid var(--border); }

    /* 處方成本參考 */
    .cost-total { font-size: 28px; font-weight: 800; color: var(--blue); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 1000; padding: 0; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px; max-height: 90vh;
      padding: 20px; overflow-y: auto;
      transform: translateY(100%); transition: transform .3s cubic-bezier(.32,1,.42,1);
    }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 12px;
      font-size: 15px; font-family: var(--font); background: var(--bg);
    }
    .form-group input:focus, .form-group select:focus {
      outline: none; border-color: var(--blue);
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* ── 底部 Tab Bar ── */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(255,255,255,.9); backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; padding-bottom: env(safe-area-inset-bottom);
      z-index: 50;
    }
    .tb-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 8px 4px 6px; cursor: pointer; color: var(--text3);
      font-size: 10px; font-weight: 600; gap: 3px; transition: color .15s;
    }
    .tb-item.active { color: var(--blue); }
    .tb-item .tb-icon { font-size: 22px; }

    .fab {
      position: fixed; bottom: 80px; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--blue); color: #fff; border: none;
      font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,122,255,.4); transition: transform .15s;
      z-index: 40;
    }
    .fab:hover { transform: scale(1.08); }

    .empty { text-align: center; padding: 48px 20px; color: var(--text2); }
    .empty .ei { font-size: 48px; margin-bottom: 12px; }

    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>

<!-- ══ 選人畫面 ══════════════════════════════════════════ -->
<div id="screen-user">
  <h1>診所廚房系統</h1>
  <p>今天是誰在廚房？</p>
  <div class="user-grid" id="userGrid"></div>
</div>

<!-- ══ 主畫面 ══════════════════════════════════════════════ -->
<div id="screen-main">
  <div class="topbar">
    <div class="topbar-head">
      <h1>廚房管理</h1>
      <div class="curr-user" onclick="App.logout()">
        <div class="mini-av" id="currAv">?</div>
        <span id="currName">-</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="today">📋 今日</div>
      <div class="tab" data-tab="rx">💊 處方</div>
      <div class="tab" data-tab="inv">📦 庫存</div>
      <div class="tab" data-tab="cost">💰 成本</div>
    </div>
  </div>

  <!-- 今日工作單 -->
  <div class="page active" id="page-today">
    <div class="section-head">
      <h2>▌1 今日總出單</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="staffCount" class="badge badge-blue">0人</span>
        <button class="btn btn-primary btn-sm" onclick="App.openAddCase()" style="font-size:15px;padding:6px 14px">＋ 新增出單</button>
      </div>
    </div>
    <div class="today-group-label" style="margin-bottom:6px">出席員工</div>
    <div class="staff-grid" id="staffGrid"></div>
    <div id="caseChips"></div>

    <div id="productSections"></div>
  </div>

  <!-- 個案處方 -->
  <div class="page" id="page-rx">
    <div class="section-head" style="margin-top:8px">
      <h2>處方管理</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="App.openAddProduct()">⚙ 管理產品</button>
        <button class="btn btn-primary btn-sm" onclick="App.openAddRx()">＋ 新增處方</button>
      </div>
    </div>
    <div id="rxList"></div>
  </div>

  <!-- 庫存管理 -->
  <div class="page" id="page-inv">
    <div class="section-head" style="margin-top:8px">
      <h2>庫存現況</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="App.openAddIngredient()">＋ 食材</button>
        <button class="btn btn-primary btn-sm" onclick="App.openPurchase()">進貨</button>
      </div>
    </div>
    <div id="invList"></div>
  </div>

  <!-- 成本分析 -->
  <div class="page" id="page-cost">
    <div class="cost-subtabs" style="margin-top:8px">
      <button class="cost-tab active" data-ctab="today"   onclick="App.switchCostTab('today')">今日成本</button>
      <button class="cost-tab"        data-ctab="monthly" onclick="App.switchCostTab('monthly')">月報</button>
      <button class="cost-tab"        data-ctab="rx"      onclick="App.switchCostTab('rx')">處方成本</button>
      <button class="btn btn-ghost btn-sm cost-settings-btn" onclick="App.openSettings()">⚙</button>
    </div>

    <!-- 今日成本 -->
    <div id="costSection-today" class="cost-section active">
      <div id="costToday"></div>
    </div>

    <!-- 月報 -->
    <div id="costSection-monthly" class="cost-section">
      <div class="cost-month-nav">
        <button onclick="App.prevCostMonth()">◀</button>
        <span id="costMonthLabel"></span>
        <button onclick="App.nextCostMonth()">▶</button>
      </div>
      <div id="costMonthly"></div>
    </div>

    <!-- 處方成本參考 -->
    <div id="costSection-rx" class="cost-section">
      <div id="costList"></div>
    </div>
  </div>
</div>

<!-- ══ Modals ════════════════════════════════════════════ -->
<!-- 新增使用者 -->
<div class="modal-backdrop" id="modalAddUser">
  <div class="modal">
    <div class="modal-title">新增人員</div>
    <div class="form-group">
      <label>姓名</label>
      <input id="newUserName" type="text" placeholder="輸入姓名">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddUser')">取消</button>
      <button class="btn btn-primary" onclick="App.addUser()">新增</button>
    </div>
  </div>
</div>

<!-- 新增個案出單 -->
<div class="modal-backdrop" id="modalAddCase">
  <div class="modal">
    <div class="modal-title" id="caseModalTitle">新增個案出單</div>
    <input type="hidden" id="caseEditId">
    <div class="form-group">
      <label>個案姓名</label>
      <input id="casePatientName" type="text" placeholder="可留空">
    </div>
    <div class="form-group">
      <label>選擇處方</label>
      <select id="caseRxSel"></select>
    </div>
    <div class="form-group">
      <label id="caseCupsLabel">份數</label>
      <input id="caseCups" type="number" value="1" min="1">
    </div>
    <div class="form-group">
      <label>出單方式</label>
      <div class="pkg-selector">
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="袋裝" checked>
          <span class="pkg-card">
            <span class="pkg-icon">🛍</span>
            <span class="pkg-name">袋裝</span>
            <span class="pkg-note">帶走</span>
          </span>
        </label>
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="罐裝">
          <span class="pkg-card">
            <span class="pkg-icon">🫙</span>
            <span class="pkg-name">罐裝</span>
            <span class="pkg-note">×1.1（防溢）</span>
          </span>
        </label>
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="內用">
          <span class="pkg-card">
            <span class="pkg-icon">🍽</span>
            <span class="pkg-name">內用</span>
            <span class="pkg-note">現場飲用</span>
          </span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>出單日期</label>
      <input id="caseDate" type="date">
    </div>
    <div class="form-group">
      <label>取餐時間（4位數，如 1330）</label>
      <input id="caseMealTime" type="text" value="1330" maxlength="4">
    </div>
    <div class="form-group">
      <label>備註</label>
      <input id="caseNotes" type="text" placeholder="可留空">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddCase')">取消</button>
      <button class="btn btn-primary" onclick="App.addCase()">確認出單</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯處方 -->
<div class="modal-backdrop" id="modalRx">
  <div class="modal">
    <div class="modal-title" id="modalRxTitle">新增處方</div>
    <input type="hidden" id="rxEditId">
    <div class="form-group">
      <label>所屬產品</label>
      <select id="rxProductId"></select>
    </div>
    <div class="form-group">
      <label>員工標準處方</label>
      <select id="rxIsStaff">
        <option value="0">否（個案處方）</option>
        <option value="1">是（員工每日標準）</option>
      </select>
    </div>
    <div class="form-group">
      <label>處方代號（如 RX-05）</label>
      <input id="rxCode" type="text" placeholder="RX-05">
    </div>
    <div class="form-group">
      <label>個案姓名 / 處方名稱</label>
      <input id="rxName" type="text" placeholder="姓名或名稱">
    </div>
    <div class="form-group">
      <label>配方類型</label>
      <select id="rxType">
        <option value="全配方">全配方</option>
        <option value="粉配方">粉配方（僅粉包）</option>
      </select>
    </div>
    <div class="form-group">
      <label>服用時機</label>
      <select id="rxTiming">
        <option value="餐前">餐前</option>
        <option value="隨餐">隨餐</option>
        <option value="餐後">餐後</option>
      </select>
    </div>
    <div class="form-group">
      <label>禁忌 / 注意事項</label>
      <input id="rxContra" type="text" placeholder="如：無肉桂粉改薑片">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalRx')">取消</button>
      <button class="btn btn-primary" onclick="App.saveRx()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯產品 -->
<div class="modal-backdrop" id="modalProduct">
  <div class="modal">
    <div class="modal-title" id="modalProductTitle">產品管理</div>
    <div id="productListPreview" style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:2"></div>
    <hr style="border:none;border-top:1px solid var(--separator);margin-bottom:14px">
    <input type="hidden" id="productEditId">
    <div class="form-group">
      <label>產品名稱</label>
      <input id="productName" type="text" placeholder="如：果凍、能量飲">
    </div>
    <div class="form-group">
      <label>單位</label>
      <input id="productUnit" type="text" placeholder="杯、份、顆、包…" value="份">
    </div>
    <div class="form-group">
      <label>標準批次大小（每批幾份）</label>
      <input id="productBatch" type="number" value="1" min="1">
      <small style="color:var(--text3);font-size:12px">精力湯用 3（3 杯批）；其他依實際設定</small>
    </div>
    <div class="form-group">
      <label>說明（選填）</label>
      <input id="productDesc" type="text" placeholder="產品描述">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalProduct')">取消</button>
      <button class="btn btn-primary" onclick="App.saveProduct()">新增 / 更新</button>
    </div>
  </div>
</div>

<!-- 編輯處方食材 -->
<div class="modal-backdrop" id="modalRxIngredients">
  <div class="modal">
    <div class="modal-title" id="modalRxIngTitle">編輯配方食材</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">填 0 表示不使用此食材</p>
    <input type="hidden" id="rxIngEditId">
    <div id="ingredientEditor" class="ingredient-editor"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalRxIngredients')">取消</button>
      <button class="btn btn-primary" onclick="App.saveRxIngredients()">儲存配方</button>
    </div>
  </div>
</div>

<!-- 新增食材 -->
<div class="modal-backdrop" id="modalAddIngredient">
  <div class="modal">
    <div class="modal-title">新增食材</div>
    <div class="form-group">
      <label>食材名稱</label>
      <input id="ingName" type="text" placeholder="如：薑片">
    </div>
    <div class="form-group">
      <label>單位</label>
      <select id="ingUnit">
        <option value="g">g（克）</option>
        <option value="ml">ml（毫升）</option>
        <option value="粒">粒</option>
        <option value="包">包</option>
        <option value="顆">顆</option>
      </select>
    </div>
    <div class="form-group">
      <label>分類</label>
      <select id="ingCat">
        <option value="蔬菜">蔬菜</option>
        <option value="水果">水果</option>
        <option value="粉類">粉類</option>
        <option value="膠囊">膠囊</option>
        <option value="油水">油水</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>安全量</label>
      <input id="ingSafety" type="number" value="0" min="0">
    </div>
    <div class="form-group">
      <label>儲存說明</label>
      <input id="ingStorage" type="text" placeholder="如：冷藏4°C">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddIngredient')">取消</button>
      <button class="btn btn-primary" onclick="App.addIngredient()">新增</button>
    </div>
  </div>
</div>

<!-- 進貨 -->
<div class="modal-backdrop" id="modalPurchase">
  <div class="modal">
    <div class="modal-title">記錄進貨</div>
    <div class="form-group">
      <label>食材</label>
      <select id="purchaseIng"></select>
    </div>
    <div class="form-group">
      <label>採購量</label>
      <input id="purchaseQty" type="number" placeholder="如：1500" min="0">
    </div>
    <div class="form-group">
      <label>採購金額（NT$）</label>
      <input id="purchasePrice" type="number" placeholder="如：329" min="0">
    </div>
    <div class="form-group">
      <label>採購日期</label>
      <input id="purchaseDate" type="date">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalPurchase')">取消</button>
      <button class="btn btn-primary" onclick="App.savePurchase()">確認進貨</button>
    </div>
  </div>
</div>

<!-- 調整庫存 -->
<div class="modal-backdrop" id="modalEditInv">
  <div class="modal">
    <div class="modal-title" id="editInvTitle">調整庫存</div>
    <input type="hidden" id="editInvId">
    <input type="hidden" id="editInvCountUnit">
    <input type="hidden" id="editInvCountRatio">
    <div class="form-group">
      <label id="editInvQtyLabel">目前庫存量</label>
      <input id="editInvQty" type="number" min="0" step="0.1">
      <small id="editInvQtyHint" style="color:var(--text3);font-size:12px;margin-top:4px;display:none"></small>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalEditInv')">取消</button>
      <button class="btn btn-primary" onclick="App.saveInventory()">儲存</button>
    </div>
  </div>
</div>

<!-- 系統設定 -->
<div class="modal-backdrop" id="modalSettings">
  <div class="modal">
    <div class="modal-title">成本設定</div>
    <div class="form-group">
      <label>人工費率（NT$/小時）</label>
      <input id="settLaborRate" type="number" value="250">
    </div>
    <div class="form-group">
      <label>製作時間（分鐘/杯）</label>
      <input id="settLaborMin" type="number" value="15">
    </div>
    <div class="form-group">
      <label>全配方定價（NT$）</label>
      <input id="settFullPrice" type="number" value="350">
    </div>
    <div class="form-group">
      <label>粉配方定價（NT$）</label>
      <input id="settPowderPrice" type="number" value="280">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalSettings')">取消</button>
      <button class="btn btn-primary" onclick="App.saveSettings()">儲存</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
