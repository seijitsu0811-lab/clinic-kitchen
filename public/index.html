<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>診所廚房</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --blue:   #007AFF; --green: #34C759; --orange: #FF9500;
      --red:    #FF3B30; --purple:#5856D6; --teal:   #32ADE6;
      --bg:     #F2F2F7; --card:  #FFFFFF;
      --t1:     #000000; --t2: rgba(60,60,67,.85);
      --t3:     rgba(60,60,67,.55); --t4: rgba(60,60,67,.28);
      --sep:    rgba(60,60,67,.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                   'PingFang TC', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--t1);
    }

    /* ── 頂部導覽 ─────────────────────────── */
    #nav {
      position: sticky; top: 0; z-index: 200;
      background: rgba(242,242,247,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: .5px solid var(--sep);
      padding: 14px 20px 10px;
    }
    #nav-row { display: flex; align-items: flex-start; justify-content: space-between; }
    #nav-title { font-size: 28px; font-weight: 700; letter-spacing: -.5px; }
    #nav-sub   { font-size: 12px; color: var(--t3); margin-top: 3px; }
    #season-badge {
      background: rgba(255,149,0,.1); color: var(--orange);
      border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: none; font-family: inherit; align-self: center;
    }

    /* ── 底部 Tab ─────────────────────────── */
    #tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: .5px solid var(--sep);
      display: flex; padding: 6px 0 env(safe-area-inset-bottom, 16px);
    }
    .tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; border: none; background: none; cursor: pointer;
      font-family: inherit; color: var(--t4); transition: color .15s; padding: 4px 0;
    }
    .tab.on { color: var(--blue); }
    .tab-icon  { font-size: 22px; display: block; }
    .tab-label { font-size: 10px; font-weight: 500; display: block; }

    /* ── 畫面 ─────────────────────────────── */
    .screen { display: none; padding: 0 0 88px; }
    .screen.on { display: block; }

    /* ── 共用元件 ─────────────────────────── */
    .sec {
      font-size: 11px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--t3); padding: 16px 20px 6px;
    }
    .card {
      background: var(--card); border-radius: 13px; margin: 0 16px 12px;
      overflow: hidden; box-shadow: 0 1px 0 var(--sep), 0 2px 8px rgba(0,0,0,.04);
    }
    .row {
      display: flex; align-items: center; padding: 11px 16px; gap: 12px;
      border-bottom: .5px solid var(--sep);
    }
    .row:last-child { border-bottom: none; }
    .row-icon {
      width: 30px; height: 30px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .row-body { flex: 1; min-width: 0; }
    .row-name { font-size: 15px; color: var(--t1); }
    .row-sub  { font-size: 12px; color: var(--t3); margin-top: 1px; }
    .row-val  { font-size: 15px; color: var(--t3); white-space: nowrap; }
    .badge {
      padding: 2px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .b-ok     { background: rgba(52,199,89,.1);  color: var(--green);  }
    .b-warn   { background: rgba(255,149,0,.1);  color: var(--orange); }
    .b-danger { background: rgba(255,59,48,.1);  color: var(--red);    }
    .b-case   { background: rgba(88,86,214,.1);  color: var(--purple); }
    .b-staff  { background: rgba(0,122,255,.1);  color: var(--blue);   }
    .b-sea    { background: rgba(52,199,89,.08); color: #1a8f38; font-size: 10px; }

    /* ── 今日卡片 ─────────────────────────── */
    .stats { display: flex; gap: 10px; padding: 12px 16px; }
    .stat  {
      flex: 1; background: var(--card); border-radius: 13px; padding: 12px 10px;
      text-align: center; box-shadow: 0 1px 0 var(--sep), 0 2px 8px rgba(0,0,0,.04);
    }
    .stat-num   { font-size: 26px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
    .stat-label { font-size: 10px; color: var(--t3); margin-top: 3px; font-weight: 500; }

    .vh {
      border-radius: 16px; margin: 0 16px 10px; overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.1); cursor: pointer;
    }
    .vh-inner { padding: 15px 18px; display: flex; align-items: center; gap: 14px; }
    .vh-emoji { font-size: 30px; line-height: 1; }
    .vh-body  { flex: 1; }
    .vh-name  { font-size: 17px; font-weight: 600; color: #fff; }
    .vh-desc  { font-size: 12px; color: rgba(255,255,255,.65); margin-top: 3px; }
    .vh-right { text-align: right; }
    .vh-num   { font-size: 34px; font-weight: 700; color: #fff; letter-spacing: -2px; line-height: 1; }
    .vh-unit  { font-size: 12px; color: rgba(255,255,255,.55); }
    .gc { background: linear-gradient(135deg,#5C6BC0,#7E57C2); }
    .gs { background: linear-gradient(135deg,#0288D1,#26C6DA); }

    .callout {
      background: rgba(0,122,255,.06); border-radius: 10px;
      padding: 11px 14px; margin: 0 16px 12px;
      display: flex; gap: 9px; align-items: flex-start;
    }
    .callout p { font-size: 13px; color: var(--t2); line-height: 1.55; }
    .callout b { color: var(--blue); }

    /* ── 製作模式 ─────────────────────────── */
    .seg {
      display: flex; background: rgba(120,120,128,.12);
      border-radius: 9px; padding: 2px; margin: 12px 16px;
    }
    .seg-btn {
      flex: 1; border: none; background: none; border-radius: 7px;
      padding: 7px 0; font-size: 13px; font-weight: 500;
      color: var(--t3); cursor: pointer; transition: all .18s; font-family: inherit;
    }
    .seg-btn.on { background: #fff; color: #000; box-shadow: 0 1px 4px rgba(0,0,0,.12); }

    .recipe-row { display: flex; align-items: center; padding: 10px 16px; gap: 12px; border-bottom: .5px solid var(--sep); }
    .recipe-row:last-child { border-bottom: none; }
    .recipe-row.sea { background: rgba(52,199,89,.04); border-left: 3px solid var(--green); }
    .recipe-ei { font-size: 18px; width: 26px; text-align: center; flex-shrink: 0; }
    .recipe-name { flex: 1; font-size: 15px; }
    .recipe-val  { font-size: 14px; color: var(--t3); white-space: nowrap; }

    /* SOP 步驟 */
    .step-dots { display: flex; align-items: center; padding: 8px 16px 0; }
    .sdot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; position: relative; z-index: 1;
    }
    .s-done   { background: var(--green); color: #fff; }
    .s-active { background: var(--blue); color: #fff; box-shadow: 0 0 0 5px rgba(0,122,255,.14); }
    .s-lock   { background: rgba(120,120,128,.12); color: var(--t4); }
    .sline    { flex: 1; height: 2px; background: rgba(120,120,128,.12); margin: 0 -1px; }
    .sline.done { background: var(--green); }

    .step-card {
      background: var(--card); border-radius: 16px; margin: 10px 16px 4px; padding: 18px;
      box-shadow: 0 1px 0 var(--sep), 0 4px 16px rgba(0,0,0,.06);
    }
    .step-num  { font-size: 11px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: .5px; }
    .step-title{ font-size: 20px; font-weight: 700; margin-top: 4px; letter-spacing: -.3px; }
    .step-desc { font-size: 14px; color: var(--t3); margin-top: 6px; line-height: 1.5; }

    .timer-wrap { text-align: center; padding: 16px 0 8px; }
    .timer-ring { width: 92px; height: 92px; margin: 0 auto; position: relative; }
    .timer-ring svg { transform: rotate(-90deg); }
    .timer-num {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 22px; font-weight: 300; letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
    }

    .chk-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; cursor: pointer;
    }
    .chk-box {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--sep); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all .15s;
    }
    .chk-box.on { background: var(--green); border-color: var(--green); color: #fff; }
    .chk-label  { font-size: 14px; color: var(--t2); }

    /* ── 按鈕 ─────────────────────────────── */
    .btn {
      background: var(--blue); color: #fff; border: none; border-radius: 12px;
      padding: 14px 20px; font-size: 16px; font-weight: 600;
      width: calc(100% - 32px); margin: 4px 16px 8px;
      cursor: pointer; font-family: inherit; letter-spacing: -.2px;
      display: block; transition: transform .1s, opacity .1s;
    }
    .btn:active { transform: scale(.98); opacity: .9; }
    .btn.off    { background: rgba(120,120,128,.15); color: var(--t3); pointer-events: none; }
    .btn.green  { background: var(--green); }
    .btn.sm     { font-size: 14px; padding: 11px 20px; }

    /* ── 庫存頁 ─────────────────────────────── */
    .inv-status { display: flex; gap: 4px; align-items: center; }
    .inv-bar-wrap { flex: 1; height: 4px; background: var(--sep); border-radius: 4px; overflow: hidden; }
    .inv-bar { height: 100%; border-radius: 4px; transition: width .3s; }

    /* ── 成本頁 ─────────────────────────────── */
    .cost-total {
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      text-align: center; padding: 16px 0 4px; color: var(--t1);
    }
    .cost-unit { font-size: 14px; color: var(--t3); text-align: center; padding-bottom: 12px; }

    /* ── 彈窗 ─────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 999; display: none; align-items: flex-end;
    }
    .modal-overlay.on { display: flex; }
    .modal {
      background: var(--card); border-radius: 22px 22px 0 0;
      padding: 8px 0 env(safe-area-inset-bottom, 16px);
      width: 100%; max-height: 75vh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--sep);
      border-radius: 4px; margin: 8px auto 16px;
    }
    .modal-title { font-size: 17px; font-weight: 600; text-align: center; padding-bottom: 12px; color: var(--t1); }

    /* ── 輸入欄 ─────────────────────────────── */
    .field {
      background: var(--bg); border: none; border-radius: 10px;
      padding: 12px 14px; font-size: 16px; width: 100%;
      font-family: inherit; color: var(--t1); outline: none;
      appearance: none; -webkit-appearance: none;
    }
    .field:focus { box-shadow: 0 0 0 3px rgba(0,122,255,.2); }
    label { font-size: 13px; color: var(--t3); display: block; margin-bottom: 5px; }
    .field-group { padding: 0 16px 12px; }
  </style>
</head>
<body>

<!-- 頂部導覽 -->
<div id="nav">
  <div id="nav-row">
    <div>
      <div id="nav-title">今日廚房</div>
      <div id="nav-sub"></div>
    </div>
    <button id="season-badge" onclick="openSeasonModal()">🌞 夏季</button>
  </div>
</div>

<!-- ═════════════════ 今日 ═════════════════ -->
<div class="screen on" id="s-today">
  <div class="stats" id="today-stats">
    <div class="stat"><div class="stat-num" style="color:var(--blue)" id="stat-cups">-</div><div class="stat-label">總杯數</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--green)" id="stat-batches">-</div><div class="stat-label">批次</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--orange);font-size:20px" id="stat-time">13:30</div><div class="stat-label">截止</div></div>
  </div>

  <div id="today-variants"></div>
  <div id="today-callout"></div>

  <div class="sec">今日狀態</div>
  <div class="card" id="today-status"></div>

  <button class="btn" onclick="goMake()">開始製作</button>
  <button class="btn sm" style="background:rgba(0,122,255,.08);color:var(--blue);margin-top:0"
          onclick="openOrderModal()">✏️ 修改今日訂單</button>
</div>

<!-- ═════════════════ 製作 ═════════════════ -->
<div class="screen" id="s-make">
  <div class="seg" id="make-seg">
    <button class="seg-btn on" id="sb-case"  onclick="switchVariant(1)">🏥 個案版</button>
    <button class="seg-btn"   id="sb-staff" onclick="switchVariant(2)">👥 員工版</button>
  </div>

  <div id="recipe-area"></div>

  <div class="sec">操作步驟（防呆鎖定）</div>
  <div class="step-dots" id="step-dots"></div>
  <div class="step-card" id="step-card">
    <div class="step-num"   id="step-num">步驟 1 / 6</div>
    <div class="step-title" id="step-title"></div>
    <div class="step-desc"  id="step-desc"></div>
    <div class="timer-wrap" id="timer-wrap" style="display:none">
      <div class="timer-ring">
        <svg width="92" height="92" viewBox="0 0 92 92">
          <circle cx="46" cy="46" r="40" fill="none" stroke="rgba(120,120,128,.1)" stroke-width="7"/>
          <circle id="timer-circ" cx="46" cy="46" r="40" fill="none" stroke="var(--blue)"
            stroke-width="7" stroke-dasharray="251.33" stroke-dashoffset="0"
            stroke-linecap="round"/>
        </svg>
        <div class="timer-num" id="timer-num">-</div>
      </div>
    </div>
    <div id="chk-wrap" style="display:none;padding-top:8px"></div>
  </div>
  <button class="btn" id="sop-btn" onclick="sopAction()">繼續</button>
</div>

<!-- ═════════════════ 庫存 ═════════════════ -->
<div class="screen" id="s-inv">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 16px 0">
    <div class="sec" style="padding:16px 0 6px">食材庫存</div>
    <div style="display:flex;gap:8px">
      <button class="btn sm" style="width:auto;margin:0;font-size:12px;padding:7px 12px"
              onclick="window.location='/api/export/inventory'">↓ 匯出</button>
      <button class="btn sm" style="width:auto;margin:0;font-size:12px;padding:7px 12px"
              onclick="openPurchaseModal()">+ 進貨</button>
    </div>
  </div>
  <div class="card" id="inv-list"></div>
</div>

<!-- ═════════════════ 成本 ═════════════════ -->
<div class="screen" id="s-cost">
  <div id="cost-area"></div>
</div>

<!-- ═════════════════ Tab Bar ═════════════════ -->
<nav id="tabbar">
  <button class="tab on" id="t-today" onclick="gotoTab('today','今日廚房')">
    <span class="tab-icon">🏠</span><span class="tab-label">今日</span>
  </button>
  <button class="tab" id="t-make" onclick="gotoTab('make','製作模式')">
    <span class="tab-icon">⚗️</span><span class="tab-label">製作</span>
  </button>
  <button class="tab" id="t-inv" onclick="gotoTab('inv','食材庫存')">
    <span class="tab-icon">📦</span><span class="tab-label">庫存</span>
  </button>
  <button class="tab" id="t-cost" onclick="gotoTab('cost','成本管理')">
    <span class="tab-icon">💰</span><span class="tab-label">成本</span>
  </button>
</nav>

<!-- ═════════════════ 彈窗：今日訂單 ═════════════════ -->
<div class="modal-overlay" id="modal-order" onclick="closeModal('order')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">設定今日訂單</div>
    <div class="field-group">
      <label>個案版 杯數</label>
      <input class="field" type="number" id="inp-case" min="0" value="0">
    </div>
    <div class="field-group">
      <label>員工版 杯數</label>
      <input class="field" type="number" id="inp-staff" min="0" value="0">
    </div>
    <div class="field-group">
      <label>截止時間</label>
      <input class="field" type="time" id="inp-deadline" value="13:30">
    </div>
    <div class="field-group">
      <label>執行人員</label>
      <input class="field" type="text" id="inp-staff-name" placeholder="輸入姓名">
    </div>
    <div class="field-group">
      <button class="btn" onclick="saveOrder()">儲存</button>
    </div>
  </div>
</div>

<!-- ═════════════════ 彈窗：進貨 ═════════════════ -->
<div class="modal-overlay" id="modal-purchase" onclick="closeModal('purchase')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">登記進貨</div>
    <div class="field-group">
      <label>食材</label>
      <select class="field" id="inp-ing"></select>
    </div>
    <div class="field-group">
      <label>數量</label>
      <input class="field" type="number" id="inp-qty" min="0" step="0.1">
    </div>
    <div class="field-group">
      <label>備註（效期等）</label>
      <input class="field" type="text" id="inp-note" placeholder="例：效期 2026/09/01">
    </div>
    <div class="field-group">
      <button class="btn" onclick="savePurchase()">儲存</button>
    </div>
  </div>
</div>

<!-- ═════════════════ 彈窗：換季 ═════════════════ -->
<div class="modal-overlay" id="modal-season" onclick="closeModal('season')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">切換季節</div>
    <div class="card" style="margin:0 16px 16px" id="season-list"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
