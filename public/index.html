<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>診所廚房</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-hsl: 174, 85%, 35%;
      --primary: hsl(var(--primary-hsl));
      --primary-light: hsl(174, 85%, 95%);
      --primary-dark: hsl(174, 85%, 25%);
      --primary-grad: linear-gradient(135deg, hsl(174, 85%, 35%) 0%, hsl(210, 85%, 45%) 100%);
      
      --blue: #2563EB;
      --green: #10B981;
      --red: #EF4444;
      --orange: #F59E0B;
      --purple: #6366F1;
      --gray: #64748B;
      
      --bg: #F8FAFC;
      --card: rgba(255, 255, 255, 0.85);
      --card-solid: #FFFFFF;
      --border: rgba(226, 232, 240, 0.8);
      --border-focus: hsl(174, 85%, 35%);
      --text: #0F172A;
      --text2: #475569;
      --text3: #94A3B8;
      
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.06), 0 8px 10px -6px rgba(0, 0, 0, 0.06);
      
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      --font-title: 'Outfit', 'Noto Sans TC', sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0B0F19;
        --card: rgba(20, 27, 45, 0.85);
        --card-solid: #141B2D;
        --border: rgba(51, 65, 85, 0.5);
        --text: #F8FAFC;
        --text2: #94A3B8;
        --text3: #475569;
        --primary-light: hsl(174, 85%, 12%);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text3);
    }

    /* ── 選人畫面 ── */
    #screen-user {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 20px;
      background: radial-gradient(circle at top left, rgba(13, 148, 136, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.08) 0%, transparent 40%);
    }
    #screen-user h1 {
      font-family: var(--font-title);
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
      background: var(--primary-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    #screen-user p {
      color: var(--text2);
      margin-bottom: 40px;
      font-size: 16px;
      font-weight: 500;
    }
    .user-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 520px;
    }
    .user-card {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 24px 12px 18px;
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .user-card:hover {
      border-color: var(--primary);
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    .user-card .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 4px 10px rgba(13, 148, 136, 0.3);
    }
    .user-card .uname {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .btn-add-user {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 24px 12px 18px;
      text-align: center;
      cursor: pointer;
      border: 1.5px dashed var(--border);
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .btn-add-user:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .btn-add-user .avatar {
      background: var(--bg);
      color: var(--primary);
      font-size: 24px;
      box-shadow: none;
    }

    /* ── 主畫面 ── */
    #screen-main {
      display: none;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 14px 24px 0;
      border-bottom: 1px solid var(--border);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .topbar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .topbar-head h1 {
      font-family: var(--font-title);
      font-size: 22px;
      font-weight: 800;
      background: var(--primary-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .curr-user {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      background: var(--primary-light);
      padding: 5px 12px 5px 6px;
      border-radius: 99px;
      border: 1px solid rgba(13, 148, 136, 0.15);
      transition: all 0.2s ease;
    }
    .curr-user:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }
    .curr-user .mini-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary-grad);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }
    .curr-user span {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary-dark);
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: -1px;
    }
    .tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      border-bottom: 3px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .tab:hover {
      color: var(--text);
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .page {
      display: none;
      padding: 24px 24px 96px;
      animation: fadeIn 0.3s ease-out;
    }
    .page.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── 通用卡片 ── */
    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      box-shadow: var(--shadow-lg);
    }
    .card-title {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
      border-bottom: 1.5px solid var(--primary-light);
      padding-bottom: 4px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .row:last-child {
      border-bottom: none;
    }
    .row-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
    }
    .row-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* ── 按鈕 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-primary {
      background: var(--primary-grad);
      color: #fff;
      box-shadow: 0 4px 10px rgba(13, 148, 136, 0.2);
    }
    .btn-primary:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.35);
    }
    .btn-danger {
      background: linear-gradient(135deg, #F43F5E 0%, #E11D48 100%);
      color: #fff;
      box-shadow: 0 4px 10px rgba(244, 63, 94, 0.2);
    }
    .btn-danger:hover {
      filter: brightness(1.1);
      box-shadow: 0 4px 14px rgba(244, 63, 94, 0.35);
    }
    .btn-ghost {
      background: var(--primary-light);
      color: var(--primary);
      box-shadow: none;
    }
    .btn-ghost:hover {
      background: var(--primary);
      color: #fff;
    }
    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
      border-radius: var(--radius-sm);
    }

    /* ── 狀態標籤 ── */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-green  { background: rgba(16, 185, 129, 0.15); color: var(--green); }
    .badge-orange { background: rgba(245, 158, 11, 0.15); color: var(--orange); }
    .badge-red    { background: rgba(239, 68, 68, 0.15);  color: var(--red); }
    .badge-blue   { background: rgba(37, 99, 235, 0.15);  color: var(--blue); }
    .badge-purple { background: rgba(99, 102, 241, 0.15);  color: var(--purple); }

    /* ── 今日工作單 ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 14px;
    }
    .section-head h2 {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .staff-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 10px;
    }
    .staff-chip {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .staff-chip.on {
      border-color: var(--green);
      background: rgba(16, 185, 129, 0.08);
    }
    .staff-chip.off {
      border-color: var(--border);
      opacity: 0.5;
    }
    .staff-chip.picked {
      border-color: var(--gray);
      background: rgba(100, 116, 139, 0.08);
      opacity: 0.75;
    }
    .staff-chip .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin: 0 auto 8px;
      background: var(--text3);
    }
    .staff-chip.on .dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    .staff-chip.picked .dot {
      background: var(--gray);
    }
    .staff-chip .sname {
      font-size: 12px;
      font-weight: 600;
    }
    .chip-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 3px;
    }

    .today-group-label {
      font-family: var(--font-title);
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .today-group {
      margin-top: 16px;
    }
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    /* 今日排版：左右分欄 */
    .today-split {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .today-left-col {
      flex: 1;
      min-width: 0;
    }
    .today-right-col {
      width: 260px;
      flex-shrink: 0;
    }

    /* 時程表 */
    .schedule-title {
      font-family: var(--font-title);
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }
    .sch-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      background: var(--card);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .sch-item:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .sch-time {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      min-width: 42px;
      padding-top: 1px;
    }
    .sch-staff .sch-time {
      color: var(--orange);
    }
    .sch-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .sch-detail {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
    }
    .sch-empty {
      color: var(--text3);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1.5px dashed var(--border);
    }

    /* 鮮食備料批次標籤 */
    .prep-btag-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .prep-btag {
      font-size: 10px;
      color: var(--text2);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
    }
    .prep-btag strong {
      color: var(--text);
    }

    /* 批次卡片 */
    .batch-groups-wrap {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      margin-top: 10px;
    }
    .batch-grp {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px;
      transition: all 0.2s ease;
      min-width: 160px;
      flex: 1;
    }
    .batch-grp-done {
      opacity: 0.65;
      background: rgba(16, 185, 129, 0.03);
    }
    .batch-grp-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .batch-grp-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .batch-grp-sz {
      font-size: 10px;
      color: var(--primary);
      background: var(--primary-light);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .batch-grp-done-tag {
      font-size: 11px;
      color: var(--green);
      font-weight: 700;
    }
    .batch-grp-del {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      font-size: 18px;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .batch-grp-del:hover {
      color: var(--red);
    }
    .batch-grp-members {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 38px;
      padding: 6px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      border: 1px dashed var(--border);
    }
    .bmember-chip {
      background: var(--card-solid);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: grab;
      user-select: none;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .bmember-chip:active {
      cursor: grabbing;
    }
    .bmember-chip.picked {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .bmember-chip.bmember-case {
      border-color: var(--purple);
      color: var(--purple);
    }
    .batch-add-btn {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 10px 0;
      color: var(--text2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }
    .batch-add-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }
    .batch-delete-zone {
      margin-top: 12px;
      border: 2px dashed var(--red);
      border-radius: var(--radius-md);
      text-align: center;
      padding: 12px;
      color: var(--red);
      font-size: 13px;
      font-weight: 700;
      transition: background 0.15s;
    }
    .batch-delete-zone.bdz-over {
      background: rgba(239, 68, 68, 0.1);
    }

    /* Drag over schedule items */
    .sch-draggable {
      cursor: grab;
    }
    .sch-drag-handle {
      color: var(--text3);
      font-size: 14px;
      padding-right: 8px;
      cursor: grab;
      flex-shrink: 0;
    }
    .sch-drag-over {
      background: var(--primary-light);
      border-radius: var(--radius-md);
      outline: 2px dashed var(--primary);
    }
    .sch-done .sch-name {
      text-decoration: line-through;
      opacity: 0.5;
    }
    .sch-done .sch-detail {
      opacity: 0.4;
    }
    .sch-done-mark {
      color: var(--green);
      font-weight: 800;
      font-size: 15px;
      margin-left: auto;
      flex-shrink: 0;
    }
    .sch-note {
      font-size: 11px;
      color: var(--orange);
      font-weight: 500;
      margin-top: 4px;
    }
    .batch-grp-time {
      font-size: 11px;
      color: var(--primary);
      cursor: pointer;
      background: var(--primary-light);
      border-radius: 6px;
      padding: 2px 8px;
      font-weight: 600;
    }
    .batch-grp-time:hover {
      filter: brightness(0.95);
    }
    .batch-time-input {
      font-size: 11px;
      border: 1px solid var(--primary);
      border-radius: 6px;
      padding: 1px 4px;
      width: 80px;
      font-family: inherit;
    }

    /* Case Chip */
    .case-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-width: 84px;
      padding: 12px 10px 10px;
      border-radius: var(--radius-md);
      cursor: pointer;
      border: 1.5px solid var(--primary);
      background: var(--primary-light);
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .case-chip[data-type="powder"] {
      border-color: var(--purple);
      background: rgba(99, 102, 241, 0.08);
    }
    .case-chip[data-type="full"] {
      border-color: var(--green);
      background: rgba(16, 185, 129, 0.08);
    }
    .case-chip[data-inuse="1"] {
      border-color: var(--orange);
      background: rgba(245, 158, 11, 0.08);
    }
    .case-chip.picked {
      border-color: var(--border);
      background: var(--card);
      opacity: 0.55;
    }
    .case-chip .sname {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .case-chip .chip-sub {
      font-size: 10px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* Outlines & Heads */
    .case-group-head {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      margin: 20px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .case-group-head::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .future-cases-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      background: var(--bg);
    }
    .future-date-head {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 800;
      color: var(--primary);
      margin: 16px 0 6px;
    }
    .future-date-head:first-child {
      margin-top: 0;
    }

    .prep-storage-head {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      margin: 12px 0 6px;
    }
    .storage-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .storage-badge.cold   { background: rgba(13, 148, 136, 0.15); color: #0d9488; }
    .storage-badge.freeze { background: rgba(37, 99, 235, 0.15); color: var(--blue); }
    .storage-badge.jar    { background: rgba(245, 158, 11, 0.15); color: var(--orange); }

    .supp-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .supp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
    }
    .supp-item .si-name {
      font-size: 11px;
      color: var(--text2);
    }
    .supp-item .si-val {
      font-size: 13px;
      font-weight: 700;
      color: var(--purple);
    }

    /* Column layout for batches */
    .batch-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    @media (max-width: 768px) {
      .batch-split { grid-template-columns: 1fr; }
    }
    .batch-col {
      min-width: 0;
    }
    .batch-col-head {
      font-family: var(--font-title);
      font-size: 13px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .aw-empty {
      color: var(--text3);
      font-size: 13px;
      padding: 24px 0;
      text-align: center;
      background: var(--card);
      border-radius: var(--radius-md);
      border: 1.5px dashed var(--border);
    }

    /* Inventory Warnings */
    .inv-warn-tab {
      font-size: 10px;
      font-weight: 700;
      background: var(--red);
      color: #fff;
      border-radius: 99px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
      box-shadow: 0 2px 6px rgba(239, 68, 68, 0.3);
    }
    .inv-row-shortage {
      background: rgba(239, 68, 68, 0.03);
      border-left: 3px solid var(--red) !important;
    }
    .inv-need-row {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }
    .aw-cups-badge {
      font-size: 14px;
      color: var(--purple);
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: var(--radius-md);
      padding: 6px 16px;
      display: inline-block;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .aw-cups-badge strong {
      font-size: 20px;
      margin: 0 4px;
      font-family: var(--font-title);
    }
    .aw-cat {
      font-family: var(--font-title);
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 0 4px;
      border-bottom: 1.5px solid var(--primary-light);
    }
    
    .batch-notes-wrap {
      margin-top: 12px;
    }
    .batch-notes-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
    }
    .batch-notes-area {
      width: 100%;
      resize: vertical;
      font-size: 13px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      color: var(--text);
      font-family: inherit;
    }
    .batch-notes-area:focus {
      outline: none;
      border-color: var(--primary);
    }

    .batch-box {
      background: linear-gradient(135deg, hsl(174, 85%, 35%) 0%, hsl(210, 85%, 45%) 100%);
      border-radius: var(--radius-lg);
      padding: 20px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(13, 148, 136, 0.25);
    }
    .batch-box .num {
      font-family: var(--font-title);
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
    }
    .batch-box .label {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 6px;
      font-weight: 500;
    }

    /* 粉包 */
    .powder-box {
      background: linear-gradient(135deg, #F59E0B 0%, #EA580C 100%);
      border-radius: var(--radius-lg);
      padding: 20px;
      color: #fff;
      margin-bottom: 16px;
      box-shadow: 0 6px 20px rgba(245, 158, 11, 0.25);
    }
    .powder-title {
      font-family: var(--font-title);
      font-size: 14px;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 6px;
      letter-spacing: 0.8px;
    }
    .powder-ratio {
      font-size: 12px;
      opacity: 0.8;
      margin-bottom: 10px;
    }
    .powder-per-cup {
      font-size: 15px;
      margin-bottom: 14px;
    }
    .powder-per-cup strong {
      font-family: var(--font-title);
      font-size: 30px;
      font-weight: 800;
    }
    .powder-batch-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .powder-batch-item {
      background: rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      min-width: 90px;
      text-align: center;
      backdrop-filter: blur(4px);
    }
    .pb-label {
      font-size: 11px;
      opacity: 0.85;
      margin-bottom: 4px;
    }
    .pb-val {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }
    .pb-unit {
      font-size: 13px;
      font-weight: 400;
    }

    /* 個案粉包行 */
    .case-powder {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin: 12px 0;
      font-size: 13px;
    }
    .cp-icon {
      font-size: 16px;
    }
    .cp-label {
      font-weight: 700;
      color: #D97706;
    }
    .cp-val {
      color: var(--text);
    }
    .cp-val strong {
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
      color: #EA580C;
    }
    .cp-ratio {
      color: var(--text2);
      font-size: 11px;
    }
    .cp-jar {
      color: #B45309;
      font-size: 11px;
      font-weight: 700;
      background: rgba(245, 158, 11, 0.15);
      border-radius: 6px;
      padding: 2px 8px;
    }

    /* 員工配方警告 */
    .srx-alert {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: var(--radius-md);
      font-size: 13px;
    }
    .srx-icon {
      font-size: 16px;
      margin-right: 6px;
    }
    .srx-label {
      font-weight: 700;
      color: #B45309;
    }
    .srx-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .srx-item {
      background: var(--card-solid);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    /* Patient Details */
    .case-patient {
      display: inline-block;
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
      color: var(--primary);
      margin-right: 8px;
    }
    .case-notes {
      font-size: 13px;
      color: var(--text);
      background: rgba(245, 158, 11, 0.05);
      border-left: 3px solid var(--orange);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 8px 12px;
      margin: 10px 0;
    }
    .case-dtype {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      background: var(--primary-light);
      border-radius: 6px;
      padding: 2px 8px;
      color: var(--primary);
    }

    /* Package selector */
    .pkg-selector {
      display: flex;
      gap: 10px;
    }
    .pkg-opt {
      flex: 1;
      cursor: pointer;
    }
    .pkg-opt input[type="radio"] {
      display: none;
    }
    .pkg-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      background: var(--card);
      transition: all 0.2s ease;
    }
    .pkg-opt input:checked + .pkg-card {
      border-color: var(--primary);
      background: var(--primary-light);
      box-shadow: var(--shadow-sm);
    }
    .pkg-icon {
      font-size: 24px;
    }
    .pkg-name {
      font-size: 13px;
      font-weight: 700;
    }
    .pkg-note {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
    }

    /* 產品區塊 */
    .product-section {
      margin-bottom: 36px;
    }
    .product-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary);
    }
    .product-tag {
      background: var(--primary-grad);
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 4px 14px;
      border-radius: 99px;
      box-shadow: var(--shadow-sm);
    }
    .product-hname {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .product-unit-note {
      font-size: 12px;
      color: var(--text3);
      margin-left: auto;
    }
    .product-no-staff {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 16px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 12px;
      border: 1px dashed var(--border);
      text-align: center;
    }

    /* 處方分組 */
    .rx-product-group {
      margin-bottom: 32px;
    }
    .rx-product-label {
      font-family: var(--font-title);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: var(--primary);
      text-transform: uppercase;
      padding: 6px 0;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 14px;
    }

    .case-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-left: 4.5px solid var(--primary);
      box-shadow: var(--shadow-md);
      transition: all 0.2s ease;
    }
    .case-card.powder {
      border-left-color: var(--purple);
    }
    .case-card .case-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .case-card .case-name {
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
    }
    .case-card .case-meta {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }
    
    .prep-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .prep-item {
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      border: 1px solid var(--border);
    }
    .prep-item .pi-name {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
    }
    .prep-item .pi-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    .warn-box {
      background: rgba(239, 68, 68, 0.05);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      color: var(--red);
      font-size: 13px;
      font-weight: 600;
      margin-top: 12px;
    }

    /* ── 處方 ── */
    .rx-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      transition: all 0.25s ease;
    }
    .rx-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }
    .rx-code {
      font-family: var(--font-title);
      font-size: 12px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 1px;
    }
    .rx-name {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 800;
      margin: 4px 0;
    }
    .rx-meta {
      font-size: 12px;
      color: var(--text2);
    }
    
    .ingredient-editor {
      display: grid;
      gap: 6px;
    }
    .ie-row {
      display: grid;
      grid-template-columns: 1fr auto 90px;
      gap: 10px;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .ie-row:last-child {
      border-bottom: none;
    }
    .ie-cat {
      font-family: var(--font-title);
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.8px;
      padding: 16px 0 6px;
      grid-column: 1 / -1;
      border-bottom: 1.5px solid var(--primary-light);
    }
    .ie-row input[type=number] {
      width: 90px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      text-align: right;
      font-family: var(--font);
      background: var(--card);
      color: var(--text);
    }
    .ie-row input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* ── 庫存 ── */
    .inv-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .inv-row:last-child {
      border-bottom: none;
    }
    .inv-name {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
    }
    .inv-unit {
      font-size: 12px;
      color: var(--text2);
    }
    .inv-qty {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 800;
      min-width: 80px;
      text-align: right;
      color: var(--primary-dark);
    }
    .inv-edit {
      cursor: pointer;
      color: var(--primary);
      font-size: 14px;
      padding: 4px;
      border-radius: 6px;
      transition: background-color 0.15s;
    }
    .inv-edit:hover {
      background: var(--primary-light);
    }
    .cat-header {
      font-family: var(--font-title);
      font-size: 12px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 1px;
      padding: 18px 0 8px;
      text-transform: uppercase;
      border-bottom: 1.5px solid var(--primary-light);
    }

    /* ── 成本 ── */
    .cost-subtabs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 12px 0 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .cost-tab {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s ease;
    }
    .cost-tab:hover {
      color: var(--text);
    }
    .cost-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .cost-settings-btn {
      margin-left: auto;
    }
    .cost-section {
      display: none;
    }
    .cost-section.active {
      display: block;
    }

    .cost-grand-card {
      background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
      border-radius: var(--radius-lg);
      padding: 24px;
      color: #fff;
      margin-bottom: 18px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .cost-grand-label {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .cost-grand-num {
      font-family: var(--font-title);
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #38BDF8 0%, #34D399 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .cost-grand-sub {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 13px;
      opacity: 0.85;
      font-weight: 500;
    }

    .cost-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
    }
    .cost-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .cost-card-name {
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 800;
    }
    .cost-card-cups {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }
    .cost-card-total {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 800;
      color: var(--primary);
    }
    .cost-card-per {
      font-size: 12px;
      color: var(--text2);
      text-align: right;
      margin-top: 4px;
    }
    .cost-breakdown {
      margin-top: 6px;
      background: var(--bg);
      border-radius: var(--radius-md);
      padding: 8px 12px;
      border: 1px solid var(--border);
    }
    .cb-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 13px;
    }
    .cb-row:last-child {
      border-bottom: none;
    }
    .cb-zero {
      color: var(--text3);
    }

    /* 月報 */
    .cost-month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 18px;
    }
    .cost-month-nav button {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 14px;
      font-size: 16px;
      cursor: pointer;
      color: var(--primary);
      transition: all 0.15s;
    }
    .cost-month-nav button:hover {
      background: var(--primary-light);
    }
    .cost-month-nav span {
      font-family: var(--font-title);
      font-size: 18px;
      font-weight: 800;
      min-width: 100px;
      text-align: center;
    }
    .cost-month-summary {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .cms-card {
      background: var(--card);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      min-width: 150px;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cms-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 4px;
    }
    .cms-total {
      font-family: var(--font-title);
      font-size: 20px;
      font-weight: 800;
      color: var(--primary);
    }
    .cms-detail {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }
    .cost-month-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .cost-month-table th {
      text-align: left;
      padding: 10px 8px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      border-bottom: 2px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cost-month-table td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    .cost-month-table tr:last-child td {
      border-bottom: none;
    }
    .cost-month-table .col-date {
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
    }
    .cost-month-table .col-total {
      font-weight: 700;
      color: var(--text);
    }
    .cost-month-table .col-zero {
      color: var(--text3);
    }
    .cost-month-table .row-total {
      background: var(--primary-light);
    }
    .cost-month-table .row-total td {
      font-weight: 800;
      color: var(--primary-dark);
      border-top: 2px solid var(--primary);
    }

    .cost-total {
      font-family: var(--font-title);
      font-size: 28px;
      font-weight: 800;
      color: var(--primary);
    }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--card-solid);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      padding: 24px;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      border: 1px solid var(--border);
      transform: scale(0.9) translateY(20px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-backdrop.open .modal {
      transform: scale(1) translateY(0);
    }
    .modal-title {
      font-family: var(--font-title);
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 20px;
      color: var(--text);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      transition: all 0.15s ease;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }
    .modal-actions .btn {
      flex: 1;
      justify-content: center;
    }

    /* ── 底部 Tab Bar（手機專用）── */
    .tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 50;
    }
    .tb-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 4px 6px;
      cursor: pointer;
      color: var(--text3);
      font-size: 10px;
      font-weight: 600;
      gap: 3px;
      transition: color 0.15s;
    }
    .tb-item.active {
      color: var(--primary);
    }
    .tb-item .tb-icon {
      font-size: 20px;
    }

    .fab {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary-grad);
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(13, 148, 136, 0.4);
      transition: all 0.2s ease;
      z-index: 40;
    }
    .fab:hover {
      transform: scale(1.1) rotate(90deg);
      box-shadow: 0 6px 20px rgba(13, 148, 136, 0.5);
    }

    .empty {
      text-align: center;
      padding: 56px 20px;
      color: var(--text3);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-lg);
      background: var(--card);
    }
    .empty .ei {
      font-size: 48px;
      margin-bottom: 16px;
    }

    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* ══ 通用優化 ═══════════════════════════════════════════ */
    .page {
      max-width: 960px;
      margin: 0 auto;
    }
    .btn {
      touch-action: manipulation;
    }

    /* 預設隱藏底部 tabbar（只在手機顯示） */
    .tabbar {
      display: none;
    }

    /* ══ 平板（641–1024px）═════════════════════════════════ */
    @media (min-width: 641px) and (max-width: 1024px) {
      .page { padding: 20px 24px 80px; }
      .topbar { padding: 14px 24px 0; }
      .today-right-col { width: 220px; }
      .sop-schedule-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ══ 手機（≤640px）═════════════════════════════════════ */
    @media (max-width: 640px) {
      .topbar { padding: 12px 16px 0; }
      .topbar-head { margin-bottom: 8px; }
      .topbar-head h1 { font-size: 18px; }
      .topbar .tabs { display: none; }

      .tabbar {
        display: flex;
        height: calc(52px + env(safe-area-inset-bottom));
      }
      .tb-item { padding: 6px 4px; font-size: 9px; }
      .tb-item .tb-icon { font-size: 18px; }

      .page { padding: 16px 14px 88px; }
      .section-head { margin: 16px 0 10px; }
      .section-head h2 { font-size: 15px; }

      .fab { bottom: calc(64px + env(safe-area-inset-bottom)); right: 16px; width: 48px; height: 48px; font-size: 24px; }

      .today-split { flex-direction: column; gap: 16px; }
      .today-right-col { width: 100%; }
      .today-left-col { width: 100%; }

      .staff-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .staff-chip { padding: 10px 6px; }
      .staff-chip .sname { font-size: 11px; }

      .batch-groups-wrap { flex-direction: column; }
      .batch-grp { width: 100%; }
      .batch-split { grid-template-columns: 1fr; gap: 12px; }

      .case-chip { min-width: 72px; padding: 10px 6px; }
      .case-chip .sname { font-size: 11px; }

      .btn { min-height: 40px; padding: 8px 16px; font-size: 13px; }
      .btn-sm { min-height: 32px; padding: 4px 12px; font-size: 12px; }

      .card, .rx-card, .case-card, .sop-card { border-radius: var(--radius-md); padding: 16px; }
      .inv-name { font-size: 14px; }
      .inv-qty { font-size: 16px; }

      .ie-row { grid-template-columns: 1fr 60px; }
      .cost-subtabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
      .cost-tab { padding: 8px 12px; }

      .modal-backdrop {
        align-items: flex-end;
      }
      .modal {
        border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        width: 100%;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.32, 1, 0.42, 1);
      }
      .modal-backdrop.open .modal {
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<!-- ══ 選人畫面 ══════════════════════════════════════════ -->
<div id="screen-user">
  <h1>診所廚房系統</h1>
  <p>今天是誰在廚房？</p>
  <div class="user-grid" id="userGrid"></div>
</div>

<!-- ══ 主畫面 ══════════════════════════════════════════════ -->
<div id="screen-main">
  <div class="topbar">
    <div class="topbar-head">
      <h1>廚房管理</h1>
      <div class="curr-user" onclick="App.logout()">
        <div class="mini-av" id="currAv">?</div>
        <span id="currName">-</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="today">📋 今日</div>
      <div class="tab" data-tab="rx">💊 處方</div>
      <div class="tab" data-tab="inv">📦 庫存 <span id="invWarningBadge" class="inv-warn-tab" style="display:none"></span></div>
      <div class="tab" data-tab="cost">💰 成本</div>
      <div class="tab" data-tab="sop">🗂 SOP</div>
    </div>
  </div>

  <!-- 今日工作單 -->
  <div class="page active" id="page-today">
    <div class="section-head">
      <h2 style="display:flex;align-items:center;gap:10px;">
        <span>▌1 今日總出單</span>
        <span id="todayDateLabel" style="font-size:14px;color:var(--text2);font-weight:600;background:var(--bg);padding:2px 10px;border-radius:6px;border:1px solid var(--border);"></span>
      </h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="staffCount" class="badge badge-blue">0人</span>
        <button class="btn btn-primary btn-sm" onclick="App.openAddCase()" style="font-size:15px;padding:6px 14px">＋ 新增出單</button>
      </div>
    </div>
    <div class="today-split">
      <div class="today-left-col">
        <div class="today-group-label" style="margin-bottom:6px">員工批次分配 <span style="font-weight:400;color:var(--text3);font-size:10px">（可拖曳換批次）</span></div>
        <div class="staff-grid" id="staffGrid"></div>
        <div id="todayLeavesAlert" style="display:none;margin-top:10px;background:rgba(239, 68, 68, 0.05);border:1px solid rgba(239, 68, 68, 0.15);border-radius:var(--radius-md);padding:10px 12px;color:var(--red);font-size:13px;font-weight:600;"></div>
        <div id="caseChips"></div>
      </div>
      <div class="today-right-col">
        <div id="todaySchedule"></div>
      </div>
    </div>

    <div id="productSections"></div>

    <div class="labor-section">
      <div class="section-head" style="margin-top:20px;margin-bottom:8px">
        <h2 style="font-size:15px">⏱ 今日工時記錄</h2>
        <button class="btn btn-ghost btn-sm" onclick="App.openAddLabor()">＋ 記錄工時</button>
      </div>
      <div class="card" style="padding:8px 16px">
        <div id="laborSection"><div style="color:var(--text3);font-size:13px;padding:8px 0">載入中…</div></div>
      </div>
    </div>
  </div>

  <!-- 個案處方 -->
  <div class="page" id="page-rx">
    <div class="section-head" style="margin-top:8px">
      <h2>處方管理</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="App.openAddProduct()">⚙ 管理產品</button>
        <button class="btn btn-primary btn-sm" onclick="App.openAddRx()">＋ 新增處方</button>
      </div>
    </div>
    <div id="rxList"></div>
  </div>

  <!-- 庫存管理 -->
  <div class="page" id="page-inv">
    <div class="section-head" style="margin-top:8px">
      <h2>庫存現況</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="App.openAddIngredient()">＋ 食材</button>
        <button class="btn btn-primary btn-sm" onclick="App.openPurchase()">進貨</button>
      </div>
    </div>
    <div id="invList"></div>
  </div>

  <!-- 成本分析 -->
  <div class="page" id="page-cost">
    <div class="cost-subtabs" style="margin-top:8px">
      <button class="cost-tab active" data-ctab="today"   onclick="App.switchCostTab('today')">今日成本</button>
      <button class="cost-tab"        data-ctab="monthly" onclick="App.switchCostTab('monthly')">月報</button>
      <button class="cost-tab"        data-ctab="rx"      onclick="App.switchCostTab('rx')">處方成本</button>
      <button class="cost-tab"        data-ctab="trial"   onclick="App.switchCostTab('trial')">試菜記錄</button>
      <button class="btn btn-ghost btn-sm cost-settings-btn" onclick="App.openSettings()">⚙</button>
    </div>

    <!-- 今日成本 -->
    <div id="costSection-today" class="cost-section active">
      <div id="costToday"></div>
    </div>

    <!-- 月報 -->
    <div id="costSection-monthly" class="cost-section">
      <div class="cost-month-nav">
        <button onclick="App.prevCostMonth()">◀</button>
        <span id="costMonthLabel"></span>
        <button onclick="App.nextCostMonth()">▶</button>
      </div>
      <div id="costMonthly"></div>
    </div>

    <!-- 處方成本參考 -->
    <div id="costSection-rx" class="cost-section">
      <div id="costList"></div>
    </div>

    <!-- 試菜記錄 -->
    <div id="costSection-trial" class="cost-section">
      <div class="section-head" style="margin-bottom:12px">
        <h2 style="font-size:15px">試菜專案</h2>
        <button class="btn btn-primary btn-sm" onclick="App.openAddTrial()">＋ 新增試菜</button>
      </div>
      <div id="trialList"></div>
    </div>
  </div>

  <!-- SOP / 品質確認 -->
  <div class="page" id="page-sop">
    <div id="sopContent"></div>
  </div>

  <!-- ── 底部 Tab Bar（手機專用）── -->
  <nav class="tabbar" id="mainTabbar">
    <div class="tb-item active" data-tab="today" onclick="App.switchTab('today')">
      <span class="tb-icon">📋</span>
      <span>今日</span>
    </div>
    <div class="tb-item" data-tab="rx" onclick="App.switchTab('rx')">
      <span class="tb-icon">💊</span>
      <span>處方</span>
    </div>
    <div class="tb-item" data-tab="inv" onclick="App.switchTab('inv')">
      <span class="tb-icon">📦</span>
      <span>庫存</span>
    </div>
    <div class="tb-item" data-tab="cost" onclick="App.switchTab('cost')">
      <span class="tb-icon">💰</span>
      <span>成本</span>
    </div>
    <div class="tb-item" data-tab="sop" onclick="App.switchTab('sop')">
      <span class="tb-icon">🗂</span>
      <span>SOP</span>
    </div>
  </nav>
</div>

<!-- ══ Modals ════════════════════════════════════════════ -->
<!-- 新增使用者 -->
<div class="modal-backdrop" id="modalAddUser">
  <div class="modal">
    <div class="modal-title">新增人員</div>
    <div class="form-group">
      <label>姓名</label>
      <input id="newUserName" type="text" placeholder="輸入姓名">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddUser')">取消</button>
      <button class="btn btn-primary" onclick="App.addUser()">新增</button>
    </div>
  </div>
</div>

<!-- 新增個案出單 -->
<div class="modal-backdrop" id="modalAddCase">
  <div class="modal">
    <div class="modal-title" id="caseModalTitle">新增個案出單</div>
    <input type="hidden" id="caseEditId">
    <div class="form-group">
      <label>個案姓名</label>
      <input id="casePatientName" type="text" placeholder="可留空">
    </div>
    <div class="form-group">
      <label>選擇處方</label>
      <select id="caseRxSel"></select>
    </div>
    <div class="form-group">
      <label id="caseCupsLabel">份數</label>
      <input id="caseCups" type="number" value="1" min="1">
    </div>
    <div class="form-group">
      <label>出單方式</label>
      <div class="pkg-selector">
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="袋裝" checked>
          <span class="pkg-card">
            <span class="pkg-icon">🛍</span>
            <span class="pkg-name">袋裝</span>
            <span class="pkg-note">帶走</span>
          </span>
        </label>
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="罐裝">
          <span class="pkg-card">
            <span class="pkg-icon">🫙</span>
            <span class="pkg-name">罐裝</span>
            <span class="pkg-note">×1.1（防溢）</span>
          </span>
        </label>
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="全配方">
          <span class="pkg-card">
            <span class="pkg-icon">📦</span>
            <span class="pkg-name">全配方</span>
            <span class="pkg-note">蔬果＋粉×1.1</span>
          </span>
        </label>
        <label class="pkg-opt">
          <input type="radio" name="casePowderType" value="內用">
          <span class="pkg-card">
            <span class="pkg-icon">🍽</span>
            <span class="pkg-name">內用</span>
            <span class="pkg-note">現場飲用</span>
          </span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>出單日期</label>
      <input id="caseDate" type="date">
    </div>
    <div class="form-group">
      <label>取餐時間（4位數，如 1330）</label>
      <input id="caseMealTime" type="text" value="1330" maxlength="4">
    </div>
    <div class="form-group">
      <label>備註</label>
      <input id="caseNotes" type="text" placeholder="可留空">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddCase')">取消</button>
      <button class="btn btn-primary" onclick="App.addCase()">確認出單</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯處方 -->
<div class="modal-backdrop" id="modalRx">
  <div class="modal">
    <div class="modal-title" id="modalRxTitle">新增處方</div>
    <input type="hidden" id="rxEditId">
    <div class="form-group">
      <label>所屬產品</label>
      <select id="rxProductId"></select>
    </div>
    <div class="form-group">
      <label>員工標準處方</label>
      <select id="rxIsStaff">
        <option value="0">否（個案處方）</option>
        <option value="1">是（員工每日標準）</option>
      </select>
    </div>
    <div class="form-group">
      <label>處方代號（如 RX-05）</label>
      <input id="rxCode" type="text" placeholder="RX-05">
    </div>
    <div class="form-group">
      <label>個案姓名 / 處方名稱</label>
      <input id="rxName" type="text" placeholder="姓名或名稱">
    </div>
    <div class="form-group">
      <label>配方類型</label>
      <select id="rxType">
        <option value="全配方">全配方</option>
        <option value="粉配方">粉配方（僅粉包）</option>
      </select>
    </div>
    <div class="form-group">
      <label>服用時機</label>
      <select id="rxTiming">
        <option value="餐前">餐前</option>
        <option value="隨餐">隨餐</option>
        <option value="餐後">餐後</option>
      </select>
    </div>
    <div class="form-group">
      <label>禁忌 / 注意事項</label>
      <input id="rxContra" type="text" placeholder="如：無肉桂粉改薑片">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalRx')">取消</button>
      <button class="btn btn-primary" onclick="App.saveRx()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增 / 編輯產品 -->
<div class="modal-backdrop" id="modalProduct">
  <div class="modal">
    <div class="modal-title" id="modalProductTitle">產品管理</div>
    <div id="productListPreview" style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:2"></div>
    <hr style="border:none;border-top:1px solid var(--separator);margin-bottom:14px">
    <input type="hidden" id="productEditId">
    <div class="form-group">
      <label>產品名稱</label>
      <input id="productName" type="text" placeholder="如：果凍、能量飲">
    </div>
    <div class="form-group">
      <label>單位</label>
      <input id="productUnit" type="text" placeholder="杯、份、顆、包…" value="份">
    </div>
    <div class="form-group">
      <label>標準批次大小（每批幾份）</label>
      <input id="productBatch" type="number" value="1" min="1">
      <small style="color:var(--text3);font-size:12px">精力湯用 3（3 杯批）；其他依實際設定</small>
    </div>
    <div class="form-group">
      <label>說明（選填）</label>
      <input id="productDesc" type="text" placeholder="產品描述">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalProduct')">取消</button>
      <button class="btn btn-primary" onclick="App.saveProduct()">新增 / 更新</button>
    </div>
  </div>
</div>

<!-- 編輯處方食材 -->
<div class="modal-backdrop" id="modalRxIngredients">
  <div class="modal">
    <div class="modal-title" id="modalRxIngTitle">編輯配方食材</div>
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">填 0 表示不使用此食材</p>
    <input type="hidden" id="rxIngEditId">
    <div id="ingredientEditor" class="ingredient-editor"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalRxIngredients')">取消</button>
      <button class="btn btn-primary" onclick="App.saveRxIngredients()">儲存配方</button>
    </div>
  </div>
</div>

<!-- 新增食材 -->
<div class="modal-backdrop" id="modalAddIngredient">
  <div class="modal">
    <div class="modal-title">新增食材</div>
    <div class="form-group">
      <label>食材名稱</label>
      <input id="ingName" type="text" placeholder="如：薑片">
    </div>
    <div class="form-group">
      <label>單位</label>
      <select id="ingUnit">
        <option value="g">g（克）</option>
        <option value="ml">ml（毫升）</option>
        <option value="粒">粒</option>
        <option value="包">包</option>
        <option value="顆">顆</option>
      </select>
    </div>
    <div class="form-group">
      <label>分類</label>
      <select id="ingCat">
        <option value="蔬菜">蔬菜</option>
        <option value="水果">水果</option>
        <option value="粉類">粉類</option>
        <option value="膠囊">膠囊</option>
        <option value="油水">油水</option>
        <option value="其他">其他</option>
      </select>
    </div>
    <div class="form-group">
      <label>安全量</label>
      <input id="ingSafety" type="number" value="0" min="0">
    </div>
    <div class="form-group">
      <label>儲存說明</label>
      <input id="ingStorage" type="text" placeholder="如：冷藏4°C">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalAddIngredient')">取消</button>
      <button class="btn btn-primary" onclick="App.addIngredient()">新增</button>
    </div>
  </div>
</div>

<!-- 進貨 -->
<div class="modal-backdrop" id="modalPurchase">
  <div class="modal">
    <div class="modal-title">記錄進貨</div>
    <div class="form-group">
      <label>食材</label>
      <select id="purchaseIng"></select>
    </div>
    <div class="form-group">
      <label>採購量</label>
      <input id="purchaseQty" type="number" placeholder="如：1500" min="0">
    </div>
    <div class="form-group">
      <label>採購金額（NT$）</label>
      <input id="purchasePrice" type="number" placeholder="如：329" min="0">
    </div>
    <div class="form-group">
      <label>採購日期</label>
      <input id="purchaseDate" type="date">
    </div>
    <div style="display:flex;gap:10px">
      <div class="form-group" style="flex:1">
        <label>品項類型</label>
        <select id="purchaseItemType">
          <option value="食材">🥬 食材</option>
          <option value="用具">🔧 用具</option>
        </select>
      </div>
      <div class="form-group" style="flex:1">
        <label>用途歸屬</label>
        <select id="purchasePurpose">
          <option value="精力湯">精力湯</option>
          <option value="試菜">試菜</option>
          <option value="公用">公用</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalPurchase')">取消</button>
      <button class="btn btn-primary" onclick="App.savePurchase()">確認進貨</button>
    </div>
  </div>
</div>

<!-- 調整庫存 -->
<div class="modal-backdrop" id="modalEditInv">
  <div class="modal">
    <div class="modal-title" id="editInvTitle">調整庫存</div>
    <input type="hidden" id="editInvId">
    <input type="hidden" id="editInvCountUnit">
    <input type="hidden" id="editInvCountRatio">
    <div class="form-group">
      <label id="editInvQtyLabel">目前庫存量</label>
      <input id="editInvQty" type="number" min="0" step="0.1">
      <small id="editInvQtyHint" style="color:var(--text3);font-size:12px;margin-top:4px;display:none"></small>
    </div>
    <div class="form-group">
      <label>建議使用天數（效期）</label>
      <input id="editInvShelfLife" type="number" min="0" step="1" placeholder="0 = 未設定">
      <small style="color:var(--text3);font-size:12px;margin-top:4px;display:block">採購後建議在幾天內使用完畢（0 = 未設定）</small>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalEditInv')">取消</button>
      <button class="btn btn-primary" onclick="App.saveInventory()">儲存</button>
    </div>
  </div>
</div>

<!-- 系統設定 -->
<div class="modal-backdrop" id="modalSettings">
  <div class="modal">
    <div class="modal-title">成本設定</div>
    <div class="form-group">
      <label>人工費率（NT$/小時）</label>
      <input id="settLaborRate" type="number" value="250">
    </div>
    <div class="form-group">
      <label>製作時間（分鐘/杯）</label>
      <input id="settLaborMin" type="number" value="15">
    </div>
    <div class="form-group">
      <label>全配方定價（NT$）</label>
      <input id="settFullPrice" type="number" value="350">
    </div>
    <div class="form-group">
      <label>粉配方定價（NT$）</label>
      <input id="settPowderPrice" type="number" value="280">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalSettings')">取消</button>
      <button class="btn btn-primary" onclick="App.saveSettings()">儲存</button>
    </div>
  </div>
</div>

<!-- 記錄人力 -->
<div class="modal-backdrop" id="modalLabor">
  <div class="modal">
    <div class="modal-title">記錄人力工時</div>
    <div class="form-group">
      <label>任務類型</label>
      <select id="laborTaskType">
        <option value="備料">備料</option>
        <option value="製作">製作（打汁）</option>
        <option value="品質確認">品質確認</option>
        <option value="清潔">清潔</option>
        <option value="試菜">試菜</option>
        <option value="採買">採買</option>
      </select>
    </div>
    <div class="form-group">
      <label>用途</label>
      <select id="laborPurpose">
        <option value="精力湯">精力湯</option>
        <option value="試菜">試菜</option>
        <option value="公用">公用</option>
      </select>
    </div>
    <div class="form-group">
      <label>執行人員（選填）</label>
      <select id="laborUser">
        <option value="">（本人）</option>
      </select>
    </div>
    <div class="form-group">
      <label>工時（分鐘）</label>
      <input id="laborMinutes" type="number" min="1" step="5" placeholder="如：30">
      <small style="color:var(--text3);font-size:12px;margin-top:4px;display:block">費率 NT$196/小時，自動計算成本</small>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalLabor')">取消</button>
      <button class="btn btn-primary" onclick="App.saveLabor()">記錄</button>
    </div>
  </div>
</div>

<!-- 新增試菜專案 -->
<div class="modal-backdrop" id="modalTrial">
  <div class="modal">
    <div class="modal-title" id="modalTrialTitle">新增試菜專案</div>
    <input type="hidden" id="trialEditId">
    <div class="form-group">
      <label>菜色名稱</label>
      <input id="trialName" type="text" placeholder="如：五色蔬菜湯">
    </div>
    <div class="form-group">
      <label>狀態</label>
      <select id="trialStatus">
        <option value="試驗中">試驗中</option>
        <option value="已確定">已確定（列入菜單）</option>
        <option value="停止">停止試驗</option>
      </select>
    </div>
    <div class="form-group">
      <label>備註</label>
      <input id="trialNotes" type="text" placeholder="可留空">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalTrial')">取消</button>
      <button class="btn btn-primary" onclick="App.saveTrial()">儲存</button>
    </div>
  </div>
</div>

<!-- 新增試菜次數記錄 -->
<div class="modal-backdrop" id="modalTrialSession">
  <div class="modal">
    <div class="modal-title">新增試菜記錄</div>
    <input type="hidden" id="trialSessionRecipeId">
    <div class="form-group">
      <label>試菜日期</label>
      <input id="trialSessionDate" type="date">
    </div>
    <div class="form-group">
      <label>參與人員</label>
      <input id="trialSessionParticipants" type="text" placeholder="如：個管師、執行者">
    </div>
    <div class="form-group">
      <label>工時（分鐘）</label>
      <input id="trialSessionMinutes" type="number" min="0" step="5" placeholder="0">
    </div>
    <div class="form-group">
      <label>本次記錄</label>
      <input id="trialSessionNotes" type="text" placeholder="調整重點、問題、下次改善方向">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="App.closeModal('modalTrialSession')">取消</button>
      <button class="btn btn-primary" onclick="App.saveTrialSession()">儲存</button>
    </div>
  </div>
</div>

<!-- Unified style block is in the head -->

<script src="app.js"></script>
</body>
</html>
